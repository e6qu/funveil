name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: e6qu/funveil
  FV_RELEASE_TAG: ${{ github.ref_name }}

jobs:
  # ===========================================================================
  # Build binaries for all platforms + WASM
  # ===========================================================================
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: fv-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: fv-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: fv-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: fv-darwin-arm64
          - target: wasm32-wasip1
            runner: ubuntu-latest
            artifact: fv-wasm
            wasm: true
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install WASI SDK
        if: matrix.wasm
        run: |
          WASI_SDK_VERSION=25
          curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz | tar xz -C /opt
          {
            echo "WASI_SDK_PATH=/opt/wasi-sdk-${WASI_SDK_VERSION}.0"
            echo "CC_wasm32_wasip1=/opt/wasi-sdk-${WASI_SDK_VERSION}.0/bin/clang"
            echo "CXX_wasm32_wasip1=/opt/wasi-sdk-${WASI_SDK_VERSION}.0/bin/clang++"
          } >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Configure linker (aarch64-linux)
        if: matrix.cross
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p staging
          if [ "${{ matrix.wasm }}" = "true" ]; then
            cp target/${{ matrix.target }}/release/fv.wasm staging/fv.wasm
          else
            cp target/${{ matrix.target }}/release/fv staging/fv
          fi
          tar czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 1

  # ===========================================================================
  # Build arch-specific container images
  # ===========================================================================
  build-containers:
    name: Container (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: fv-linux-amd64
            platform: linux/amd64
          - arch: arm64
            artifact: fv-linux-arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Extract binary
        run: |
          tar xzf ${{ matrix.artifact }}.tar.gz
          chmod +x fv

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  # ===========================================================================
  # Create multi-arch manifest
  # ===========================================================================
  manifest:
    name: Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: build-containers
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push versioned manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Create and push latest manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ===========================================================================
  # Create GitHub Release with all assets
  # ===========================================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, manifest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*.tar.gz
          body: |
            ## Installation

            ### Binary

            Download the appropriate binary for your platform and add to PATH:

            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `fv-linux-amd64.tar.gz` |
            | Linux ARM64 | `fv-linux-arm64.tar.gz` |
            | macOS x86_64 | `fv-darwin-amd64.tar.gz` |
            | macOS ARM64 | `fv-darwin-arm64.tar.gz` |

            ### Container

            ```sh
            docker pull ghcr.io/e6qu/funveil:${{ steps.version.outputs.version }}
            ```

            ### WASM (Experimental)

            Download `fv-wasm.tar.gz` and run with a WASI-compatible runtime:

            ```sh
            # Using wasmtime (https://wasmtime.dev)
            wasmtime fv.wasm -- --help
            wasmtime --dir=. fv.wasm -- veil src/main.rs#1-10

            # Using wasmer (https://wasmer.io)
            wasmer run --dir=. fv.wasm -- --help
            ```

            Note: WASM support is experimental. File system access requires granting the runtime access to your working directory (e.g., `--dir=.` for wasmtime/wasmer).
