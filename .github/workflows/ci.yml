name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Lint: format + clippy + build check
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Check build
        run: cargo check --all-targets --all-features

  # ===========================================================================
  # Test: unit + integration + CLI tests
  # ===========================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run all tests
        run: cargo test --all-targets --all-features --verbose

  # ===========================================================================
  # E2E: Docker tests + container security scan
  # ===========================================================================
  e2e:
    name: E2E & Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: docker build -t funveil-e2e -f e2e/Dockerfile .
      - name: Run E2E tests
        run: docker run --rm funveil-e2e
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'funveil-e2e'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ===========================================================================
  # Coverage: tarpaulin + badge freshness check
  # ===========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust nightly (required for branch coverage)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage (line + branch)
        run: |
          cargo +nightly llvm-cov --all-features --branch --json --output-path coverage.json
          cargo +nightly llvm-cov report --all-features --branch 2>&1 | tee coverage-output.txt
      - name: Check thresholds (97% line, 87% branch — absolute floors)
        run: |
          python3 << 'PYEOF'
          import json, sys

          with open("coverage.json") as f:
              data = json.load(f)

          totals = data["data"][0]["totals"]
          stmt = totals["lines"]["percent"]
          branch = totals["branches"]["percent"]

          print(f"Line coverage: {stmt:.2f}%")
          print(f"Branch coverage: {branch:.2f}%")
          failed = False
          if stmt < 96:
              print(f"::error::Line coverage {stmt:.2f}% is below 96% absolute floor")
              failed = True
          if branch < 87:
              print(f"::error::Branch coverage {branch:.2f}% is below 87% absolute floor")
              failed = True
          if failed:
              sys.exit(1)
          print("Coverage meets absolute thresholds ✓")
          PYEOF

  # ===========================================================================
  # Diff Coverage (PR only)
  # ===========================================================================
  diff-coverage:
    name: Diff Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust nightly (required for branch coverage)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage for base branch
        run: |
          git fetch origin "$BASE_REF":base_branch
          git checkout base_branch
          cargo +nightly llvm-cov --all-features --branch --json --output-path base_coverage.json || true
        env:
          BASE_REF: ${{ github.base_ref }}
      - name: Generate coverage for PR branch
        run: |
          git checkout "$HEAD_REF"
          cargo +nightly llvm-cov --all-features --branch --json --output-path pr_coverage.json
        env:
          HEAD_REF: ${{ github.head_ref }}
      - name: Check coverage does not regress (1% tolerance, absolute floors enforced)
        run: |
          python3 << 'PYEOF'
          import json, sys

          def load(path):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  totals = data["data"][0]["totals"]
                  return {
                      "stmt": totals["lines"]["percent"],
                      "branch": totals["branches"]["percent"],
                  }
              except Exception:
                  return None

          base = load("base_coverage.json")
          pr = load("pr_coverage.json")

          if not base or not pr:
              print("::warning::Could not generate coverage for both branches, skipping regression check")
              sys.exit(0)

          print(f"Base: line={base['stmt']:.2f}% branch={base['branch']:.2f}%")
          print(f"PR:   line={pr['stmt']:.2f}% branch={pr['branch']:.2f}%")

          # Absolute floors — coverage must never drop below these
          STMT_FLOOR = 96.0
          BRANCH_FLOOR = 87.0
          # Relative tolerance — allow up to 1% decrease as long as floors are met
          TOLERANCE = 1.0

          failed = False
          stmt_delta = base["stmt"] - pr["stmt"]
          branch_delta = base["branch"] - pr["branch"]

          # Enforce absolute floors first (these cannot be overridden by tolerance)
          if pr["stmt"] < STMT_FLOOR:
              print(f"::error::Line coverage {pr['stmt']:.2f}% is below {STMT_FLOOR}% absolute floor")
              failed = True
          if pr["branch"] < BRANCH_FLOOR:
              print(f"::error::Branch coverage {pr['branch']:.2f}% is below {BRANCH_FLOOR}% absolute floor")
              failed = True

          # Then check relative regression (only fails if delta > tolerance AND above floor)
          if stmt_delta > TOLERANCE and not failed:
              print(f"::error::Line coverage decreased by {stmt_delta:.2f}% (>{TOLERANCE}%): {pr['stmt']:.2f}% < {base['stmt']:.2f}%")
              failed = True
          if branch_delta > TOLERANCE and not failed:
              print(f"::error::Branch coverage decreased by {branch_delta:.2f}% (>{TOLERANCE}%): {pr['branch']:.2f}% < {base['branch']:.2f}%")
              failed = True

          if failed:
              sys.exit(1)
          print("No coverage regression detected ✓")
          PYEOF
      - name: Generate per-file coverage report
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os

          def load(path):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  totals = data["data"][0]["totals"]
                  return {
                      "stmt": totals["lines"]["percent"],
                      "branch": totals["branches"]["percent"],
                  }
              except Exception:
                  return None

          pr = load("pr_coverage.json")
          base = load("base_coverage.json")

          lines = ["## Coverage Report", ""]
          lines.append("| Metric | PR | Base | Delta |")
          lines.append("|--------|-----|------|-------|")
          if pr and base:
              for label, key in [("Line", "stmt"), ("Branch", "branch")]:
                  d = pr[key] - base[key]
                  sign = "+" if d > 0 else ""
                  lines.append(f"| **{label}** | {pr[key]:.2f}% | {base[key]:.2f}% | {sign}{d:.2f}% |")
          elif pr:
              lines.append(f'| **Line** | {pr["stmt"]:.2f}% | N/A | |')
              lines.append(f'| **Branch** | {pr["branch"]:.2f}% | N/A | |')
          lines.append("")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write("\n".join(lines))
          PYEOF
      - name: Post coverage comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function loadCoverage(path) {
              try {
                const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                const totals = data.data[0].totals;
                const files = (data.data[0].files || []).map(f => ({
                  file: f.filename,
                  linePct: f.summary.lines.percent,
                  branchPct: f.summary.branches.percent,
                  linesHit: f.summary.lines.covered,
                  linesTotal: f.summary.lines.count,
                }));
                return { stmt: totals.lines.percent, branch: totals.branches.percent, files };
              } catch { return null; }
            }

            const pr = loadCoverage('pr_coverage.json');
            const base = loadCoverage('base_coverage.json');

            let body = '## Coverage Report\n\n';
            body += '| Metric | PR | Base | Delta |\n|--------|-----|------|-------|\n';
            if (pr && base) {
              for (const [label, key] of [['Line', 'stmt'], ['Branch', 'branch']]) {
                const d = (pr[key] - base[key]).toFixed(2);
                const sign = d > 0 ? '+' : '';
                const emoji = d >= 0 ? '' : ' (regression)';
                body += `| **${label}** | ${pr[key].toFixed(2)}% | ${base[key].toFixed(2)}% | ${sign}${d}%${emoji} |\n`;
              }
            } else if (pr) {
              body += `| **Line** | ${pr.stmt.toFixed(2)}% | N/A | |\n`;
              body += `| **Branch** | ${pr.branch.toFixed(2)}% | N/A | |\n`;
            }

            if (pr && pr.files.length > 0) {
              body += '\n<details><summary>Per-file coverage (' + pr.files.length + ' files)</summary>\n\n';
              body += '| File | Line | Branch | Lines |\n';
              body += '|------|-----------|--------|-------|\n';
              const sorted = pr.files.sort((a, b) => a.linePct - b.linePct).slice(0, 50);
              for (const f of sorted) {
                body += `| \`${f.file}\` | ${f.linePct.toFixed(1)}% | ${f.branchPct.toFixed(1)}% | ${f.linesHit}/${f.linesTotal} |\n`;
              }
              if (pr.files.length > 50) {
                body += `| | ... and ${pr.files.length - 50} more files | | |\n`;
              }
              body += '\n</details>\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Coverage Report';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ===========================================================================
  # gVisor: smoke tests under runsc sandbox
  # ===========================================================================
  gvisor:
    name: gVisor Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install gVisor (runsc)
        run: |
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" | sudo tee /etc/apt/sources.list.d/gvisor.list > /dev/null
          sudo apt-get update && sudo apt-get install -y runsc

      - name: Configure Docker with runsc
        run: |
          sudo runsc install
          sudo systemctl restart docker

      - name: Build release binary and container
        run: |
          docker build -t funveil-e2e -f e2e/Dockerfile .
          docker create --name fv-extract funveil-e2e true
          docker cp fv-extract:/usr/local/bin/fv ./fv
          docker rm fv-extract
          docker build -t funveil-gvisor .

      - name: Run gVisor smoke tests
        run: ./e2e/run-gvisor-smoke.sh funveil-gvisor

  # ===========================================================================
  # Security: audit + deny + Python audit
  # ===========================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: Run cargo audit
        id: audit
        run: cargo audit 2>&1 | tee audit-output.txt
        continue-on-error: true
      - name: Run cargo deny
        id: deny
        run: cargo deny check 2>&1 | tee deny-output.txt
        continue-on-error: true
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Audit Python dependencies
        id: pip_audit
        run: uv run pip-audit 2>&1 | tee pip-audit-output.txt
        continue-on-error: true
      - name: Post security summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const auditOk = '${{ steps.audit.outcome }}' === 'success';
            const denyOk = '${{ steps.deny.outcome }}' === 'success';
            const pipOk = '${{ steps.pip_audit.outcome }}' === 'success';
            const allOk = auditOk && denyOk && pipOk;

            let body = '## 🔒 Security Report\n\n';
            body += '| Check | Status |\n|-------|--------|\n';
            body += `| cargo audit | ${auditOk ? '✅ Pass' : '⚠️ Issues found'} |\n`;
            body += `| cargo deny | ${denyOk ? '✅ Pass' : '⚠️ Issues found'} |\n`;
            body += `| pip-audit | ${pipOk ? '✅ Pass' : '⚠️ Issues found'} |\n`;

            if (!allOk) {
              const sections = [
                { name: 'cargo audit', ok: auditOk, file: 'audit-output.txt' },
                { name: 'cargo deny', ok: denyOk, file: 'deny-output.txt' },
                { name: 'pip-audit', ok: pipOk, file: 'pip-audit-output.txt' },
              ];
              for (const s of sections) {
                if (!s.ok && fs.existsSync(s.file)) {
                  const output = fs.readFileSync(s.file, 'utf8').slice(-3000);
                  body += `\n<details><summary>${s.name} output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>\n`;
                }
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## 🔒 Security Report';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Fail if any security check failed
        if: steps.audit.outcome == 'failure' || steps.deny.outcome == 'failure' || steps.pip_audit.outcome == 'failure'
        run: |
          echo "::error::One or more security checks failed"
          exit 1

  # ===========================================================================
  # Build: cross-compilation checks for all release targets
  # ===========================================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: wasm32-wasip2
            runner: ubuntu-latest
            wasm: true
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Install WASI SDK
        if: matrix.wasm
        run: |
          WASI_SDK_VERSION=25
          WASI_SDK_DIR="wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux"
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/${WASI_SDK_DIR}.tar.gz" | tar xz -C /opt
          {
            echo "WASI_SDK_PATH=/opt/${WASI_SDK_DIR}"
            echo "CC_wasm32_wasip2=/opt/${WASI_SDK_DIR}/bin/clang"
            echo "CXX_wasm32_wasip2=/opt/${WASI_SDK_DIR}/bin/clang++"
          } >> "$GITHUB_ENV"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Configure linker (aarch64-linux)
        if: matrix.cross
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - name: Patch dependencies for WASM
        if: matrix.wasm
        run: ./scripts/patch-wasm-deps.sh
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Check binary (native only)
        if: "!matrix.cross && !matrix.wasm"
        run: |
          ./target/${{ matrix.target }}/release/fv --help
          file ./target/${{ matrix.target }}/release/fv

  # ===========================================================================
  # Advisory: non-blocking checks (pedantic lint, geiger, semver, outdated)
  # ===========================================================================
  advisory:
    name: Advisory Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install advisory tools
        run: |
          cargo install cargo-geiger --locked
          cargo install cargo-semver-checks --locked
          cargo install cargo-outdated --locked
      - name: Clippy pedantic
        run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -W clippy::nursery || true
      - name: Unsafe code check (geiger)
        run: cargo geiger --all-features --all-targets || true
      - name: Semver check
        run: cargo semver-checks check-release || true
      - name: Outdated dependencies
        run: cargo outdated --exit-code 1 || true
