name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Check and Lint Jobs
  # ===========================================================================
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-pedantic:
    name: Clippy Pedantic (Advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy pedantic
        run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -W clippy::nursery

  check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check build
        run: cargo check --all-targets --all-features

  # ===========================================================================
  # Test Jobs - Separate Categories
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests (lib only)
        run: cargo test --lib --verbose

  integration-tests:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test --test integration_test --verbose

  cli-tests:
    name: CLI Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Run CLI tests
        run: cargo test --test cli_test --verbose

  e2e-tests-docker:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: |
          docker build -t funveil-e2e -f e2e/Dockerfile .
      - name: Run E2E tests
        run: |
          docker run --rm funveil-e2e

  # ===========================================================================
  # Security and Audit Jobs
  # ===========================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cargo deny check

  audit-python:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Audit Python dependencies
        run: uv run pip-audit

  # ===========================================================================
  # SAST Jobs
  # ===========================================================================
  geiger:
    name: Unsafe Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Check for unsafe code
        run: cargo geiger --all-features --all-targets || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage
        run: |
          cargo tarpaulin --out Xml --out Stdout --output-dir ./coverage 2>&1 | tee coverage-output.txt
      - name: Check coverage threshold (97%)
        run: |
          # Extract the final coverage percentage from tarpaulin's summary line
          COVERAGE=$(grep '% coverage' coverage-output.txt | tail -1 | sed 's/%.*//' | tr -d ' ')
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 97" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 97% threshold"
            exit 1
          fi
          echo "Coverage meets 97% threshold ✓"

  diff-coverage:
    name: Diff Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage for base branch
        run: |
          git fetch origin ${{ github.base_ref }}:base_branch
          git checkout base_branch
          # Allow test failures — we only need the coverage numbers
          cargo tarpaulin --out Stdout 2>&1 | tee base_coverage.txt || true
      - name: Generate coverage for PR branch
        run: |
          git checkout ${{ github.head_ref }}
          cargo tarpaulin --out Stdout 2>&1 | tee pr_coverage.txt
      - name: Check coverage does not regress
        run: |
          # Extract the final coverage percentage from tarpaulin's summary line
          BASE_COV=$(grep '% coverage' base_coverage.txt | tail -1 | sed 's/%.*//' | tr -d ' ' || echo "")
          PR_COV=$(grep '% coverage' pr_coverage.txt | tail -1 | sed 's/%.*//' | tr -d ' ' || echo "")

          echo "Base branch coverage: ${BASE_COV:-(not available)}%"
          echo "PR branch coverage: ${PR_COV:-(not available)}%"

          # Skip comparison if either coverage is unavailable
          if [ -z "$BASE_COV" ] || [ -z "$PR_COV" ]; then
            echo "::warning::Could not determine coverage for both branches, skipping regression check"
            exit 0
          fi

          # Fail if PR coverage dropped more than 1% below base
          THRESHOLD=$(echo "$BASE_COV - 1" | bc -l)
          if [ "$(echo "$PR_COV < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::PR coverage ${PR_COV}% regressed more than 1% below base ${BASE_COV}%"
            exit 1
          fi

          echo "Coverage did not regress ✓"
      - name: Generate per-file coverage report
        if: always()
        run: |
          # Build per-file table from PR coverage output
          {
            echo "## Coverage Report"
            echo ""
            if [ -n "$BASE_COV" ] && [ -n "$PR_COV" ]; then
              DELTA=$(echo "$PR_COV - $BASE_COV" | bc -l)
              SIGN=""
              if [ "$(echo "$DELTA > 0" | bc -l)" -eq 1 ]; then SIGN="+"; fi
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| **PR coverage** | ${PR_COV}% |"
              echo "| **Base coverage** | ${BASE_COV}% |"
              echo "| **Delta** | ${SIGN}${DELTA}% |"
            else
              PR_COV=$(grep '% coverage' pr_coverage.txt | tail -1 | sed 's/%.*//' | tr -d ' ' || echo "N/A")
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| **PR coverage** | ${PR_COV}% |"
            fi
            echo ""
            echo "<details><summary>Per-file coverage</summary>"
            echo ""
            echo '```'
            grep '^|| ' pr_coverage.txt | grep -v '^|| $' | sed 's/^|| //' || true
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          BASE_COV: ${{ env.BASE_COV }}
          PR_COV: ${{ env.PR_COV }}
      - name: Post coverage comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Parse coverage data
            const prText = fs.readFileSync('pr_coverage.txt', 'utf8');
            const baseText = fs.existsSync('base_coverage.txt') ? fs.readFileSync('base_coverage.txt', 'utf8') : '';

            function parseCoverage(text) {
              const match = text.match(/([\d.]+)% coverage/g);
              if (!match) return null;
              const last = match[match.length - 1];
              return parseFloat(last);
            }

            function parseFiles(text) {
              const lines = text.split('\n').filter(l => l.startsWith('|| ') && l.includes(':'));
              return lines.map(l => {
                const clean = l.replace(/^\|\| /, '');
                const [file, rest] = clean.split(': ');
                const fracMatch = rest.match(/(\d+)\/(\d+)/);
                const changeMatch = rest.match(/([+-][\d.]+)%/);
                if (!fracMatch) return null;
                const [, hit, total] = fracMatch;
                const pct = total > 0 ? ((hit / total) * 100).toFixed(1) : '100.0';
                const change = changeMatch ? changeMatch[1] : null;
                return { file: file.trim(), hit: +hit, total: +total, pct: +pct, change };
              }).filter(Boolean);
            }

            const prCov = parseCoverage(prText);
            const baseCov = parseCoverage(baseText);
            const files = parseFiles(prText);

            // Build comment
            let body = '## 📊 Coverage Report\n\n';

            body += '| Metric | Value |\n|--------|-------|\n';
            body += `| **PR coverage** | ${prCov !== null ? prCov + '%' : 'N/A'} |\n`;
            if (baseCov !== null) {
              body += `| **Base coverage** | ${baseCov}% |\n`;
              const delta = (prCov - baseCov).toFixed(2);
              const sign = delta > 0 ? '+' : '';
              const emoji = delta >= 0 ? '✅' : '⚠️';
              body += `| **Delta** | ${emoji} ${sign}${delta}% |\n`;
            }

            body += '\n<details><summary>Per-file coverage (' + files.length + ' files)</summary>\n\n';
            body += '| File | Coverage | Lines | Change |\n';
            body += '|------|----------|-------|--------|\n';

            // Show files with changes first, then lowest coverage
            const changed = files.filter(f => f.change && f.change !== '+0.00');
            const sorted = [...changed.sort((a,b) => a.pct - b.pct)];
            const remaining = files.filter(f => !changed.includes(f)).sort((a,b) => a.pct - b.pct);
            const display = [...sorted, ...remaining].slice(0, 50);

            for (const f of display) {
              const bar = f.pct >= 90 ? '🟢' : f.pct >= 70 ? '🟡' : '🔴';
              const ch = f.change ? ` (${f.change}%)` : '';
              body += `| ${bar} \`${f.file}\` | ${f.pct}% | ${f.hit}/${f.total} | ${ch} |\n`;
            }
            if (files.length > 50) {
              body += `| | ... and ${files.length - 50} more files | | |\n`;
            }

            body += '\n</details>\n';

            // Find and update existing comment or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## 📊 Coverage Report';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  trivy:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: docker build -t funveil-scan -f e2e/Dockerfile .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'funveil-scan'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Run semver checks
        run: cargo semver-checks check-release || true

  outdated:
    name: Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked
      - name: Check for outdated dependencies
        run: cargo outdated --exit-code 1 || true

  # ===========================================================================
  # Build Jobs
  # ===========================================================================
  build-debug:
    name: Build (Debug)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build debug
        run: cargo build --verbose

  build-release:
    name: Build (Release)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --verbose
      - name: Check binary
        run: |
          ./target/release/fv --help
          file ./target/release/fv

  # ===========================================================================
  # Badge Freshness Check
  # ===========================================================================
  badge-check:
    name: Badge Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Verify README badges are up to date
        run: make badge-check

  # ===========================================================================
  # Test Summary
  # ===========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, cli-tests, e2e-tests-docker]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test Category | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Tests | ${{ needs.cli-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (Docker) | ${{ needs.e2e-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
