name: Mutation Testing

on:
  pull_request:
    branches: [main]
    paths: ['src/**/*.rs']

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: Mutation Testing (PR diff)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Generate diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "Diff lines: $(wc -l < pr.diff)"

      - name: Run mutation tests on PR diff
        run: |
          if [ ! -s pr.diff ]; then
            echo "No source changes in diff, skipping"
            exit 0
          fi
          cargo mutants -vV --in-diff pr.diff --shard ${{ matrix.shard }}/4 --in-place -- --all-targets

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutants-shard-${{ matrix.shard }}
          path: mutants.out/

  mutants-summary:
    name: Mutation Summary
    runs-on: ubuntu-latest
    needs: [mutants]
    if: always()
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: mutants-shard-*
          merge-multiple: true
          path: mutants-results/

      - name: Summarize results
        run: |
          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY

          if [ -d mutants-results ]; then
            CAUGHT=$(cat mutants-results/caught.txt 2>/dev/null | wc -l || echo 0)
            MISSED=$(cat mutants-results/missed.txt 2>/dev/null | wc -l || echo 0)
            UNVIABLE=$(cat mutants-results/unviable.txt 2>/dev/null | wc -l || echo 0)
            TIMEOUT=$(cat mutants-results/timeout.txt 2>/dev/null | wc -l || echo 0)

            echo "| Outcome | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Caught | $CAUGHT |" >> $GITHUB_STEP_SUMMARY
            echo "| Missed | $MISSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Unviable | $UNVIABLE |" >> $GITHUB_STEP_SUMMARY
            echo "| Timeout | $TIMEOUT |" >> $GITHUB_STEP_SUMMARY

            if [ "$MISSED" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Missed Mutants" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat mutants-results/missed.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No mutation results found (no source changes in PR?)" >> $GITHUB_STEP_SUMMARY
          fi
