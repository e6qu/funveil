repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: strip-ai-attribution
        name: Strip AI attribution from commit messages
        language: script
        entry: scripts/hooks/strip-ai-attribution.sh
        stages: [commit-msg]
        always_run: true

      - id: cargo-fmt
        name: Auto-format Rust code
        language: system
        entry: cargo fmt --all
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: Run clippy lints
        language: system
        entry: cargo clippy --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [rust]

      - id: dead-code
        name: Check for dead code
        language: system
        entry: bash -c 'cargo check --all-targets 2>&1 | grep -q "warning.*dead_code" && { echo "Dead code detected:"; cargo check --all-targets 2>&1 | grep "dead_code"; exit 1; } || exit 0'
        pass_filenames: false
        types: [rust]

      - id: shellcheck
        name: Lint shell scripts
        language: system
        entry: shellcheck
        types: [shell]
        exclude: '^\.venv/'

      - id: markdownlint
        name: Lint markdown files
        language: system
        entry: npx markdownlint-cli2
        types: [markdown]
        exclude: '^(\.venv/|mutants\.out|target/)'

      - id: actionlint
        name: Lint GitHub Actions workflows
        language: system
        entry: actionlint
        files: '\.github/workflows/.*\.ya?ml$'
        pass_filenames: false

      - id: check-badges
        name: Check README badge format integrity
        language: script
        entry: scripts/hooks/check-badges.sh
        files: 'README\.md'
        pass_filenames: false

      - id: update-badges
        name: Update README badges
        language: system
        entry: bash -c 'make update-badges && git add README.md'
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      - id: rebase-on-main
        name: Rebase on origin/main and sync local main
        language: script
        entry: scripts/hooks/rebase-on-main.sh
        stages: [pre-push]
        always_run: true
        pass_filenames: false
