repos:
  - repo: local
    hooks:
      - id: strip-ai-attribution
        name: Strip AI attribution from commit messages
        language: script
        entry: scripts/hooks/strip-ai-attribution.sh
        stages: [commit-msg]
        always_run: true

      - id: cargo-fmt-check
        name: Check Rust formatting
        language: system
        entry: cargo fmt --all -- --check
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: Run clippy lints
        language: system
        entry: cargo clippy --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [rust]

      - id: badge-freshness
        name: Verify README badges are up to date
        language: system
        entry: make badge-check
        pass_filenames: false
        stages: [pre-push]
        always_run: true
