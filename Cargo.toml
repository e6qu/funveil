[package]
name = "funveil"
version = "0.1.0"
edition = "2021"
authors = ["e6qu"]
license = "AGPL-3.0"
description = "A lightweight tool for controlling file visibility in AI agent workspaces"
repository = "https://github.com/e6qu/funveil"

[[bin]]
name = "fv"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
regex = "1.10"
sha2 = "0.10"
clap = { version = "4.4", features = ["derive"] }
thiserror = "1.0"
anyhow = "1.0"
walkdir = "2.4"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3.8"
assert_cmd = "2.0"
predicates = "3.0"
